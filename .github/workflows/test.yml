name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    # Skip until onboarding is complete. The marker is written by the
    # agenticbuilder-onboarding skill's STEP 7. Fresh template clones
    # don't have it yet, so CI stays green until the project is real.
    if: ${{ hashFiles('.agenticbuilder-onboarded') != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test:unit

  integration:
    name: Integration tests (Neon test branch)
    runs-on: ubuntu-latest
    # Skip until onboarding is complete (see `unit` job comment) AND
    # when the secret isn't configured (e.g. fork PRs) so the job
    # doesn't fail the whole workflow with "DATABASE_URL_TEST is not set".
    if: ${{ hashFiles('.agenticbuilder-onboarded') != '' && (github.event_name == 'push' || github.event.pull_request.head.repo.fork == false) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Run integration tests
        env:
          # Static Neon test-branch URL. Set this in GitHub
          # Settings → Secrets and variables → Actions → New repository secret.
          # See modules/vitest/env.example for what value to paste.
          DATABASE_URL_TEST: ${{ secrets.DATABASE_URL_TEST }}
        run: npm run test:integration

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    # Skip until onboarding is complete (see `unit` job comment).
    if: ${{ hashFiles('.agenticbuilder-onboarded') != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit
      - name: Run Playwright tests
        env:
          # The e2e job needs a real DB for signup to complete. Reuse the
          # same test branch the integration job points at.
          DATABASE_URL: ${{ secrets.DATABASE_URL_TEST }}
          BETTER_AUTH_SECRET: ci-secret-32-bytes-padding-padding-ok
          BETTER_AUTH_URL: http://localhost:3010
          OWNER_EMAIL: owner@example.com
          RESEND_API_KEY: re_ci_dummy_token
          EMAIL_FROM: no-reply@example.com
          AI_GATEWAY_API_KEY: vck_ci_dummy_token_padding_padding_padding
          BLOB_READ_WRITE_TOKEN: vercel_blob_rw_ci_dummy_token_padding_padding
        run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
